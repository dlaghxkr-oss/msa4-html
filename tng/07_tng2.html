<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>회원 가입을 환영합니다</h1>
    <form action="">
      <fieldset>
        <legend>사용자 정보</legend>
        <ul>
          <li>
            <label for="account">아이디</label>
            <input 
             type="text" 
             id="account"
             minlength="4" 
             maxlength="10" 
             placeholder="4자 ~ 10자 사이, 공백없이"
             >
          </li>
          <li>
            <label for="email">이메일</label>
            <input 
             type="email" 
             id="email"
             >
          </li>
          <li>
            <label for="password">비밀번호</label>
            <input 
             type="password" 
             id="password"
             placeholder="문자와 숫자, 특수 기호 포함"
             >
            </li>
          <li>
            <label for="passwordChk">비밀번호 확인</label>
            <input 
             type="password" 
             id="passwordChk"
             placeholder="문자와 숫자, 특수 기호 포함"
             >
            </li>
          <li>
            <label for="path">가입 경로</label>
            <select name="path" id="path">
              <option value="etc" selected>기타</option>
              <option value="homepage">홈페이지</option>
            </select>
          </li>
          <li>
            <label for="memo">메모</label>
            <textarea 
            name="memo" 
            id="memo" 
            cols="30" 
            rows="10" 
            placeholder="남길 말씀이 있다면 여기에"
            ></textarea>
          </li>
        </ul>
      </fieldset>
      <fieldset>
        <legend>이벤트와 새로운 소식</legend>
        
        <div>
          <input type="radio" name="event" id="y" value="y">
          <label for="y">메일 수신</label>
          <input type="radio" name="event" id="n" value="n">
          <label for="n">메일 수신 안함</label>
        </div>
      </fieldset>
      <button type="submit">가입하기</button>
      <button type="reset">취소</button>
    </form>
</body>
</html>
